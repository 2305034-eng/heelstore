<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="MJ_A3dxeuj9xIE-x2_39HwoqNQ99XH_X6hG4tqeQmj0" />
    <title>Simple Shopping Cart</title>
    <style>
        .product-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; }
        .product { border: 1px solid #ccc; padding: 15px; text-align: center; }
        .cart-summary { margin-top: 30px; border-top: 20px solid #eee; padding: 20px; font-weight: bold; }
        button { cursor: pointer; background: #28a745; color: white; border: none; padding: 10px; }
    </style>
</head>
<body>

    <h2>Product List</h2>
    <div class="product-list">
        <!-- 4 Products -->
        <div class="product">
            <h3>Product 1</h3>
            <p>Price: $<span class="price">10</span></p>
            <button onclick="addToCart('Product 1', 10)">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 2</h3>
            <p>Price: $<span class="price">20</span></p>
            <button onclick="addToCart('Product 2', 20)">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 3</h3>
            <p>Price: $<span class="price">30</span></p>
            <button onclick="addToCart('Product 3', 30)">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 4</h3>
            <p>Price: $<span class="price">40</span></p>
            <button onclick="addToCart('Product 4', 40)">Add to Cart</button>
        </div>
    </div>

    <div class="cart-summary">
        <h3>Your Cart</h3>
        <ul id="cart-items"></ul>
        <p>Total Price: $<span id="total-price">0</span></p>
    </div>

    <script>
        let totalPrice = 0;
        const cartItemsList = document.getElementById('cart-items');
        const totalPriceDisplay = document.getElementById('total-price');

        function addToCart(name, price) {
            // Update UI list
            const listItem = document.createElement('li');
            listItem.textContent = `${name} - $${price}`;
            cartItemsList.appendChild(listItem);

            // Calculate total
            totalPrice += price;
            totalPriceDisplay.textContent = totalPrice;

          window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-SKT4N24C25');

        }
    </script>
</body>
</html>
